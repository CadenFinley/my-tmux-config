# Tmux configuration generated from tmux-bindings.md

# Prefix
set -g prefix C-s
set -g prefix2 None
unbind C-b
bind C-s send-prefix

# Config
bind e new-window "#{?env:EDITOR,#{env:EDITOR},vi} ~/.config/tmux/tmux.conf"
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded tmux config"

# Sessions
bind C-c new-session
bind C-f choose-tree -s
bind S-Tab switch-client -l

# Splits and panes
bind - split-window -v
bind _ split-window -h
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind < swap-pane -U
bind > swap-pane -D
bind + resize-pane -Z
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
set -g base-index 1
set -g pane-base-index 1
bind -r C-h previous-window
bind -r C-l next-window
bind -r C-S-H swap-window -t -1
bind -r C-S-L swap-window -t +1
bind Tab last-window

# Copy mode
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Buffers
bind b list-buffers
bind p paste-buffer
bind P choose-buffer

# Mouse
set -g mouse on
bind m if -F '#{mouse}' 'set -g mouse off; display-message "Mouse: off"' 'set -g mouse on; display-message "Mouse: on"'

# Misc
bind -n C-l send-keys C-l \; clear-history
bind F run-shell "pathpicker"

# Custom non-binding settings
set -g status-position bottom
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g renumber-windows on
set -g set-clipboard on
set -ga terminal-overrides ",xterm-256color:Tc"

# Pane borders
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour39

# Status bar
set -g status-style "bg=colour234,fg=colour250"
set -g status-left-length 50
set -g status-right-length 100
set -g status-left "#[fg=colour234,bg=colour40,bold] #S #[default]"
set -g status-right "#[fg=colour250]#(whoami)@#H "
setw -g window-status-format " #[fg=colour245]#I:#W#F "
setw -g window-status-current-format "#[fg=colour234,bg=colour39,bold] #I:#W#F #[default]"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
